<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGRSI</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/Header&Footer.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <header>
        <img src="./assets/iconos/GreenCurlLogo.png" alt="">
    </header>
    <main>
        <form class="form_login">
            <h2>Ingrese su cedula y contraseña</h2>
            <div class="form_input">

                <input type="text" placeholder="Cedula">
            </div>
            <div class="form_input">
                <input type="password" placeholder="Contraseña">
            </div>
            <div class="form_input">
                <button class="btn_login"="submit">Iniciar Sesión</button>
            </div>
            <div class="form_input">
                <a class="forgot_password" href="#">¿Olvidaste tu contraseña?</a>
            </div>
        </form>
    </main>
    <footer>

    </footer>
</body>

</html>
